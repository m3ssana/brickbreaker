<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#05060d" />
    <meta name="apple-mobile-web-app-title" content="Neon Break" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>NEON BREAK</title>
    <style>
      :root {
        --ink: #e8eaff;
        --accent: #ff3ad6;
        --accent2: #20e3ff;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #05060d;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      body {
        touch-action: none;
      }

      #app {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        left: env(safe-area-inset-left, 0px);
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: max(env(safe-area-inset-top, 0px), 12px) max(env(safe-area-inset-right, 0px), 16px) 0 max(env(safe-area-inset-left, 0px), 16px);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.12em;
        z-index: 5;
      }

      .hud-block {
        background: rgba(8, 10, 22, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 8px 14px;
        font-size: 13px;
        line-height: 1.2;
        text-transform: uppercase;
      }

      .hud-label {
        font-size: 9px;
        opacity: 0.55;
        letter-spacing: 0.18em;
        margin-bottom: 2px;
      }

      .hud-value {
        font-weight: 600;
        font-size: 16px;
        color: var(--ink);
      }

      .hud-value.score {
        color: var(--accent2);
        text-shadow: 0 0 12px rgba(32, 227, 255, 0.6);
      }

      .hud-value.level {
        color: var(--accent);
        text-shadow: 0 0 12px rgba(255, 58, 214, 0.55);
      }

      .lives {
        display: inline-flex;
        gap: 5px;
        margin-top: 2px;
      }

      .life-pip {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px rgba(255, 58, 214, 0.8);
      }

      .life-pip.spent {
        background: rgba(255, 255, 255, 0.12);
        box-shadow: none;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, rgba(20, 8, 40, 0.55), rgba(5, 6, 13, 0.85));
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 10;
        text-align: center;
        padding: 24px;
        opacity: 1;
        transition: opacity 0.35s ease;
      }

      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .overlay h1 {
        font-size: clamp(40px, 12vw, 78px);
        font-weight: 800;
        letter-spacing: 0.18em;
        margin: 0 0 6px 0;
        background: linear-gradient(180deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 40px rgba(255, 58, 214, 0.4);
      }

      .overlay h2 {
        font-size: clamp(26px, 8vw, 44px);
        font-weight: 700;
        letter-spacing: 0.16em;
        margin: 0 0 10px 0;
      }

      .overlay p {
        margin: 0 0 22px 0;
        opacity: 0.7;
        max-width: 320px;
        line-height: 1.5;
        font-size: 14px;
        letter-spacing: 0.06em;
      }

      .overlay .stat-row {
        display: flex;
        gap: 22px;
        margin-bottom: 28px;
      }

      .overlay .stat-row .stat {
        text-align: center;
      }

      .overlay .stat-label {
        font-size: 10px;
        letter-spacing: 0.18em;
        opacity: 0.55;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .overlay .stat-value {
        font-size: 22px;
        font-weight: 700;
        color: var(--accent2);
        text-shadow: 0 0 12px rgba(32, 227, 255, 0.6);
      }

      .btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: linear-gradient(180deg, rgba(255, 58, 214, 0.18), rgba(32, 227, 255, 0.18));
        color: var(--ink);
        padding: 14px 32px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 8px 30px rgba(255, 58, 214, 0.25), inset 0 0 20px rgba(32, 227, 255, 0.15);
        transition: transform 0.12s ease, box-shadow 0.2s ease;
      }

      .btn:active {
        transform: scale(0.96);
      }

      .hint {
        margin-top: 18px;
        font-size: 11px;
        opacity: 0.5;
        letter-spacing: 0.18em;
      }

      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #05060d;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 1;
        transition: opacity 0.4s ease;
      }

      .intro-overlay.intro-fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .intro-video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #05060d;
      }

      .intro-skip {
        position: absolute;
        top: max(env(safe-area-inset-top, 0px), 16px);
        right: max(env(safe-area-inset-right, 0px), 16px);
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(8, 10, 22, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: var(--ink);
        font: inherit;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 8px 16px;
        border-radius: 999px;
        cursor: pointer;
        z-index: 1;
      }

      .toast {
        position: fixed;
        left: 50%;
        top: 30%;
        transform: translate(-50%, -50%) scale(0.9);
        font-size: clamp(28px, 8vw, 44px);
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        z-index: 6;
        text-shadow: 0 0 30px rgba(255, 58, 214, 0.7);
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.2, 1.2, 0.2, 1);
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* Leaderboard table inside overlays */
      .lb {
        width: 100%;
        max-width: 300px;
        margin: 10px auto 18px;
        font-size: 13px;
      }

      .lb-title {
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.5;
        text-align: center;
        margin-bottom: 8px;
      }

      .lb-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        margin-bottom: 4px;
      }

      .lb-rank {
        width: 18px;
        text-align: right;
        opacity: 0.45;
        font-size: 11px;
        flex-shrink: 0;
      }

      .lb-name {
        flex: 1;
        font-weight: 600;
        letter-spacing: 0.06em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .lb-level {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
        text-shadow: 0 0 8px rgba(255, 58, 214, 0.45);
        flex-shrink: 0;
      }

      .lb-score {
        font-variant-numeric: tabular-nums;
        color: var(--accent2);
        font-weight: 600;
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }

      /* Name entry input */
      .name-entry {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
      }

      .name-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        color: var(--ink);
        font: inherit;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-align: center;
        padding: 10px 16px;
        outline: none;
        box-sizing: border-box;
      }

      .name-input::placeholder { opacity: 0.35; }

      .name-input:focus {
        border-color: rgba(32, 227, 255, 0.5);
        box-shadow: 0 0 12px rgba(32, 227, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div class="hud">
      <div class="hud-block">
        <div class="hud-label">Score</div>
        <div class="hud-value score" id="score">0</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">Level</div>
        <div class="hud-value level" id="level">1</div>
      </div>
      <div class="hud-block">
        <div class="hud-label">Lives</div>
        <div class="lives" id="lives"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="overlay" id="overlay">
      <h2>NEON BREAK</h2>
      <p>Drag or use ← → to move the paddle. Tap or press Space to launch. Break every brick.</p>
      <button class="btn" id="start-btn">Tap to Play</button>
      <div class="hint">iPhone Chrome • Mouse + keyboard supported</div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
