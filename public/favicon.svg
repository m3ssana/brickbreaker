<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#1a0a35"/>
      <stop offset="1" stop-color="#05060d"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ballGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <rect x="6"  y="10" width="14" height="5.5" rx="1.2" fill="#ff3ad6"/>
    <rect x="22" y="10" width="14" height="5.5" rx="1.2" fill="#ffd13a"/>
    <rect x="38" y="10" width="14" height="5.5" rx="1.2" fill="#20e3ff"/>

    <rect x="6"  y="18" width="14" height="5.5" rx="1.2" fill="#ff7a3a"/>
    <rect x="22" y="18" width="14" height="5.5" rx="1.2" fill="#3aff8e"/>
    <rect x="38" y="18" width="14" height="5.5" rx="1.2" fill="#9c6dff"/>
  </g>

  <g opacity="0.55" stroke="#ff3ad6" stroke-width="0.6" fill="none">
    <line x1="6"  y1="46" x2="58" y2="46"/>
    <line x1="6"  y1="50" x2="58" y2="50" opacity="0.7"/>
    <line x1="6"  y1="54" x2="58" y2="54" opacity="0.45"/>
    <line x1="6"  y1="58" x2="58" y2="58" opacity="0.25"/>
  </g>

  <circle cx="38" cy="34" r="2.6" fill="#fff3a0" filter="url(#ballGlow)"/>

  <rect x="18" y="48.5" width="22" height="3.6" rx="1.8" fill="#20e3ff" filter="url(#glow)"/>
</svg>
